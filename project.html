<!DOCTYPE HTML>
<html>
	<head>
		<title>Project | Jessica Li</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload project-page">
		<div id="wrapper">
			<header id="header" class="site-header">
				<div class="inner">
					<a href="index.html" class="logo">
						<span class="symbol"><img src="images/logo.svg" alt="" /></span><span class="title">Portfolio</span>
					</a>
				</div>
			</header>

			<main id="main">
				<div class="inner">
					<section class="project-hero project-shell">
						<p class="eyebrow" id="project-tag">Project</p>
						<h1 id="project-title"></h1>
						<div class="project-meta" id="project-meta"></div>
					</section>

					<section class="project-layout">
						<div class="project-panel project-video-panel">
							<div class="section-label">Video Demo</div>
							<div class="video-frame">
								<iframe id="project-video" width="800" height="450" src="" title="Project video" frameborder="0" allowfullscreen></iframe>
							</div>
							<div class="project-link-row" id="project-playable-wrap">
								<div class="section-label section-label-inline">Playable Link</div>
								<a id="project-playable" href="#" target="_blank" rel="noopener noreferrer"></a>
							</div>
						</div>
						<div class="project-panel project-description-panel">
							<div class="section-label">Description</div>
							<div class="project-body" id="project-body"></div>
						</div>
					</section>

					<section class="project-gallery-shell">
						<div class="section-label">Gallery</div>
						<div class="project-gallery" id="project-gallery" aria-label="Project gallery">
							<div class="project-gallery-track" id="project-gallery-track"></div>
						</div>
					</section>
				</div>
			</main>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/site-data.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
